  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
    setTimeout(() => { document.querySelectorAll('video').forEach(v => { if(v.readyState===0)v.load(); v.play().catch(e=>console.log(e)); }); }, 100);
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

der-radius:100px;font-size:13px;font-weight:500;\n  background:var(--red);border:none;color:#fff;text-decoration:none;transition:all .22s;\n}\n.nav-cta:hover{background:var(--red-deep);transform:translateY(-1px)}\n\n\u002F* \u2500\u2500 HERO \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.hero{\n  position:relative;min-height:100vh;\n  display:flex;flex-direction:column;justify-content:center;\n  overflow:hidden;background:#100500;\n}\n.hero-bg{\n  position:absolute;inset:0;z-index:0;\n  background-image:url(\"b6627711-39bd-42c4-9c2f-cb697ab7685c\"); \u002F* will be replaced by bundler via ext-resource-dependency *\u002F\n  background-size:cover;background-position:center;\n  transform:scale(1.04);\n  animation:hero-drift 20s ease-in-out infinite alternate;\n}\n@keyframes hero-drift{0%{transform:scale(1.04) translateX(0)}100%{transform:scale(1.10) translateX(-1%)}}\n.hero::before{\n  content:'';position:absolute;inset:0;z-index:1;pointer-events:none;\n  background:\n    linear-gradient(to right,rgba(6,2,0,.88) 0%,rgba(6,2,0,.55) 42%,rgba(6,2,0,.12) 100%),\n    linear-gradient(to bottom,rgba(6,2,0,.4) 0%,transparent 22%,transparent 68%,rgba(6,2,0,.75) 100%);\n}\n.hero::after{\n  content:'';position:absolute;inset:0;z-index:2;pointer-events:none;\n  background:radial-gradient(ellipse 100% 100% at 50% 50%,transparent 50%,rgba(0,0,0,.45) 100%);\n}\n.hero-content{position:relative;z-index:3;padding:0 56px;max-width:1200px;margin:0 auto;width:100%}\n.hero-eye{\n  font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;\n  color:rgba(255,255,255,.35);margin-bottom:32px;\n  display:inline-flex;align-items:center;gap:10px;\n}\n.hero-eye::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--red);box-shadow:0 0 12px var(--red);animation:pdot 2s infinite}\n@keyframes pdot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(194,53,26,.7)}50%{opacity:.6;box-shadow:0 0 0 7px rgba(194,53,26,0)}}\n.hero-h{font-size:clamp(58px,9vw,122px);line-height:1.01;letter-spacing:-.038em;margin-bottom:28px;max-width:13ch}\n.hl-s{display:block;font-weight:700;color:#fff}\n.hl-i{display:block;font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:#EDE6DE;letter-spacing:-.022em}\n.hl-r{color:var(--red);font-style:normal}\n.hero-sub{font-size:clamp(15px,1.3vw,18px);color:rgba(255,255,255,.45);max-width:48ch;line-height:1.72;margin-bottom:52px}\n.cta-row{display:flex;gap:14px;flex-wrap:wrap}\n.btn{\n  display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:100px;\n  font-size:14px;font-weight:500;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:all .22s;\n}\n.btn svg{width:13px;height:13px}\n.btn-white{background:#fff;color:#1a0800;font-weight:700}\n.btn-white:hover{background:#F3EDE8;transform:translateY(-1px);box-shadow:0 8px 28px rgba(0,0,0,.4)}\n.btn-ghost-w{background:transparent;color:rgba(255,255,255,.72);border:1px solid rgba(255,255,255,.25)}\n.btn-ghost-w:hover{border-color:rgba(255,255,255,.55);color:#fff}\n.btn-red{background:var(--red);color:#fff;font-weight:600}\n.btn-red:hover{background:var(--red-deep);transform:translateY(-1px);box-shadow:0 6px 22px rgba(194,53,26,.45)}\n.hero-meta{\n  position:absolute;bottom:34px;left:56px;right:56px;z-index:3;\n  display:flex;justify-content:space-between;\n  font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.25);\n}\n.pdot{display:inline-block;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.55);margin-right:8px;vertical-align:middle;animation:pdot 2s infinite}\n.scroll-hint{\n  position:absolute;bottom:34px;left:50%;transform:translateX(-50%);z-index:3;\n  display:flex;flex-direction:column;align-items:center;gap:8px;\n  color:rgba(255,255,255,.2);animation:bob 2.6s ease-in-out infinite;\n}\n.scroll-hint svg{width:14px;height:14px}\n@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}\n\n\u002F* \u2500\u2500 ALARM STREAM (attention catch) \u2500\u2500\u2500\u2500 *\u002F\n.alarm-stream-section{\n  background:var(--bg2);border-top:1px solid var(--bord);\n  padding:80px 0;overflow:hidden;\n}\n.stream-label{\n  text-align:center;margin-bottom:40px;\n  font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.20em;text-transform:uppercase;color:var(--fg-faint);\n}\n.stream-label em{color:var(--red);font-style:normal}\n.stream-track{display:flex;flex-direction:column;gap:12px;overflow:hidden}\n.stream-row{display:flex;gap:10px;white-space:nowrap}\n.stream-row.r1{animation:scroll-l 28s linear infinite}\n.stream-row.r2{animation:scroll-r 22s linear infinite}\n.stream-row.r3{animation:scroll-l 34s linear infinite}\n@keyframes scroll-l{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}\n@keyframes scroll-r{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}\n.alarm-chip{\n  display:inline-flex;align-items:center;gap:8px;\n  padding:8px 14px;border-radius:100px;flex-shrink:0;\n  font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.06em;\n  background:var(--bg3);border:1px solid var(--bord);color:var(--fg-dim);\n}\n.alarm-chip.real{\n  background:rgba(194,53,26,.12);border-color:rgba(194,53,26,.35);color:var(--red);\n  animation:chip-pulse 1.4s ease-in-out infinite;\n}\n@keyframes chip-pulse{0%,100%{box-shadow:0 0 0 0 rgba(194,53,26,.4)}50%{box-shadow:0 0 0 6px rgba(194,53,26,0)}}\n.alarm-chip .cdot{width:6px;height:6px;border-radius:50%;background:var(--fg-faint);flex-shrink:0}\n.alarm-chip.real .cdot{background:var(--red);animation:pdot 1.2s infinite}\n.stream-caption{\n  text-align:center;margin-top:40px;padding:0 56px;\n  font-family:'Instrument Serif',serif;font-style:italic;\n  font-size:clamp(20px,2.2vw,30px);color:var(--fg-dim);letter-spacing:-.01em;\n}\n.stream-caption b{color:var(--fg);font-style:normal;font-family:'Geist',sans-serif;font-weight:700}\n\n\u002F* \u2500\u2500 SHARED \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.s{border-top:1px solid var(--bord)}\n.wrap{max-width:1200px;margin:0 auto;padding:160px 56px}\n.ew{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--red);margin-bottom:28px;display:inline-flex;align-items:center;gap:9px}\n.ew::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--red)}\nh2.serif{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400}\n\n\u002F* Reveal *\u002F\n.rv{opacity:0;transform:translateY(28px);transition:opacity .9s cubic-bezier(.15,.8,.2,1),transform .9s cubic-bezier(.15,.8,.2,1)}\n.rv.in{opacity:1;transform:translateY(0)}\n.rv-l{opacity:0;transform:translateX(-28px);transition:opacity .9s cubic-bezier(.15,.8,.2,1),transform .9s cubic-bezier(.15,.8,.2,1)}\n.rv-l.in{opacity:1;transform:translateX(0)}\n.rv-r{opacity:0;transform:translateX(28px);transition:opacity .9s cubic-bezier(.15,.8,.2,1),transform .9s cubic-bezier(.15,.8,.2,1)}\n.rv-r.in{opacity:1;transform:translateX(0)}\n.rv-sc{opacity:0;transform:scale(.95);transition:opacity .9s cubic-bezier(.15,.8,.2,1),transform .9s cubic-bezier(.15,.8,.2,1)}\n.rv-sc.in{opacity:1;transform:scale(1)}\n.d1{transition-delay:.10s}.d2{transition-delay:.22s}.d3{transition-delay:.34s}.d4{transition-delay:.46s}.d5{transition-delay:.58s}\n\n\u002F* \u2500\u2500 AWARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.award-wrap{background:var(--bg2)}\n.award-grid{display:grid;grid-template-columns:1fr 400px;gap:100px;align-items:center}\n.award-tag{display:inline-flex;align-items:center;gap:8px;padding:5px 14px 5px 10px;background:var(--bg3);border:1px solid var(--bord-mid);border-radius:100px;margin-bottom:32px}\n.award-tag svg{width:14px;height:14px;color:var(--red)}\n.award-tag span{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-dim)}\n.award-h{font-size:clamp(36px,4.5vw,58px);font-weight:400;letter-spacing:-.03em;line-height:1.06;margin-bottom:22px}\n.award-h strong{font-family:'Instrument Serif',serif;font-style:italic;font-weight:400}\n.award-body{color:var(--fg-dim);font-size:17px;line-height:1.75;max-width:44ch;margin-bottom:32px}\n.award-body b{color:var(--fg);font-weight:600}\n.award-global{display:inline-flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:var(--fg)}\n.award-global .dot{width:6px;height:6px;border-radius:50%;background:var(--red)}\n.award-cards{display:flex;flex-direction:column;gap:14px}\n.acard{background:var(--bg3);border:1px solid var(--bord-mid);border-radius:16px;padding:24px 28px;display:flex;align-items:center;gap:18px;transition:border-color .25s,transform .25s}\n.acard:hover{border-color:rgba(255,255,255,.22);transform:translateY(-2px)}\n.acard-icon{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700;color:#fff;font-family:'Geist',sans-serif;letter-spacing:-.02em}\n.acard-icon.red{background:var(--red);font-size:11px}\n.acard-body{flex:1}\n.acard-name{font-size:13px;font-weight:600;color:var(--fg);margin-bottom:3px}\n.acard-sub{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:var(--fg-faint)}\n.acard-badge{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:100px;border:1px solid var(--red);color:var(--red)}\n\n\u002F* \u2500\u2500 STAT CINEMA \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.stat-section{background:var(--bg);position:relative;overflow:hidden}\n\u002F* Animated alarm grid background *\u002F\n.alarm-grid-bg{\n  position:absolute;inset:0;z-index:0;\n  display:grid;grid-template-columns:repeat(20,1fr);\n  gap:0;opacity:.6;pointer-events:none;\n}\n.agb-cell{\n  display:flex;align-items:center;justify-content:center;\n  border-right:1px solid rgba(255,255,255,.025);\n  border-bottom:1px solid rgba(255,255,255,.025);\n  min-height:60px;\n}\n.agb-dot{\n  width:5px;height:5px;border-radius:50%;\n  background:var(--fg-faint);opacity:.25;\n  transition:all .3s;\n}\n.agb-dot.active{\n  background:var(--red);opacity:1;\n  box-shadow:0 0 10px var(--red);\n  animation:agb-beep var(--dur,.8s) ease-in-out infinite;\n}\n@keyframes agb-beep{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}\n\n.stat-inner{\n  position:relative;z-index:1;\n  text-align:center;padding:200px 56px;max-width:1200px;margin:0 auto;\n}\n.stat-num-wrap{position:relative;display:inline-block}\n.stat-num{\n  font-size:clamp(140px,22vw,320px);\n  font-weight:300;line-height:.88;letter-spacing:-.07em;\n  color:var(--fg);font-feature-settings:\"ss01\";\n}\n.stat-num em{color:var(--red);font-style:normal}\n.stat-num sup{font-size:.22em;color:var(--fg-dim);font-weight:400;vertical-align:super}\n\u002F* Pulse rings *\u002F\n.stat-ring{\n  position:absolute;top:50%;left:50%;\n  width:600px;height:600px;\n  transform:translate(-50%,-50%);\n  border-radius:50%;border:1px solid rgba(194,53,26,.15);\n  animation:ring-expand 3s ease-out infinite;\n  pointer-events:none;\n}\n.stat-ring:nth-child(2){animation-delay:1s}\n.stat-ring:nth-child(3){animation-delay:2s}\n@keyframes ring-expand{0%{opacity:.8;transform:translate(-50%,-50%) scale(.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.4)}}\n\n.stat-label{\n  font-family:'Instrument Serif',serif;font-style:italic;\n  font-size:clamp(22px,2.8vw,36px);color:var(--fg-dim);\n  max-width:28ch;margin:40px auto 0;line-height:1.35;letter-spacing:-.01em;\n}\n.stat-sub{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-faint);margin-top:20px}\n\n\u002F* \u2500\u2500 PROBLEM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:100px;align-items:start}\n\n\u002F* Animated ICU monitor visual *\u002F\n.icu-monitor-viz{\n  background:var(--bg2);border:1px solid var(--bord-mid);border-radius:20px;\n  padding:28px;position:relative;overflow:hidden;\n}\n.icu-monitor-header{\n  display:flex;justify-content:space-between;align-items:center;\n  margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--bord);\n}\n.icu-bed-label{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-faint)}\n.icu-time{font-family:'Geist Mono',monospace;font-size:11px;color:var(--fg-dim)}\n\u002F* ECG line *\u002F\n.icu-ecg-wrap{margin-bottom:20px}\n.icu-ecg-label{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:8px;display:flex;justify-content:space-between}\n.icu-ecg-label .bpm{color:var(--red)}\n.icu-ecg-wrap svg{width:100%;height:56px;display:block}\n\u002F* Vitals row *\u002F\n.icu-vitals{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}\n.icu-vital{background:var(--bg3);border-radius:10px;padding:10px 12px;border:1px solid var(--bord)}\n.iv-lbl{font-family:'Geist Mono',monospace;font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:5px}\n.iv-val{font-size:20px;font-weight:600;letter-spacing:-.03em;color:var(--fg);line-height:1}\n.iv-val.bad{color:var(--red)}\n.iv-unit{font-size:9px;color:var(--fg-faint);font-weight:400;margin-left:2px}\n\u002F* Alarm stream inside monitor *\u002F\n.icu-alarms{display:flex;flex-direction:column;gap:7px}\n.icu-alarm{\n  display:flex;align-items:center;gap:10px;\n  padding:9px 12px;border-radius:8px;\n  background:var(--bg3);border:1px solid var(--bord);\n  font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.04em;color:var(--fg-dim);\n}\n.icu-alarm.firing{\n  background:rgba(194,53,26,.08);border-color:rgba(194,53,26,.3);color:var(--red);\n}\n.icu-alarm .ia-dot{width:5px;height:5px;border-radius:50%;background:var(--fg-faint);flex-shrink:0}\n.icu-alarm.firing .ia-dot{background:var(--red);animation:pdot 1s infinite}\n.icu-alarm .ia-txt{flex:1}\n.icu-alarm .ia-time{color:var(--fg-faint);font-size:9px}\n\n\u002F* Beeping alarm bars *\u002F\n.alarm-copy h2{font-size:clamp(36px,4vw,54px);font-weight:400;letter-spacing:-.03em;line-height:1.08;margin-bottom:32px}\n.alarm-copy h2 em{font-family:'Instrument Serif',serif;font-style:italic}\n.alarm-copy p{color:var(--fg-dim);font-size:17px;line-height:1.75;margin-bottom:22px;max-width:46ch}\n.alarm-copy p b{color:var(--fg);font-weight:600}\n.alarm-viz-wrap{margin-top:48px;padding-top:32px;border-top:1px solid var(--bord)}\n.alarm-bars-animated{display:flex;gap:3px;align-items:flex-end;height:64px;margin-bottom:14px}\n.aba-bar{flex:1;border-radius:2px;background:var(--bg3);transition:height .15s ease}\n.aba-bar.real{background:var(--red)}\n.alarm-legend{display:flex;gap:24px;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.10em;text-transform:uppercase;color:var(--fg-faint)}\n.alarm-legend .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:6px;vertical-align:middle}\n\n\u002F* \u2500\u2500 SOLUTION \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.sol-bg{background:var(--bg2)}\n.sol-intro{max-width:780px;margin-bottom:80px}\n.sol-intro h2{font-size:clamp(40px,5vw,66px);font-weight:400;letter-spacing:-.035em;line-height:1.05;margin-bottom:24px}\n.sol-intro h2 em{font-family:'Instrument Serif',serif;font-style:italic}\n.sol-intro p{font-size:19px;color:var(--fg-dim);line-height:1.72;max-width:50ch}\n.pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}\n.pillar{\n  background:var(--bg3);border:1px solid var(--bord);border-radius:20px;\n  padding:40px 36px;min-height:280px;display:flex;flex-direction:column;\n  transition:border-color .3s,transform .3s;\n}\n.pillar:hover{border-color:var(--bord-mid);transform:translateY(-4px)}\n.pnum{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--red);margin-bottom:40px;text-transform:uppercase}\n.pillar h3{font-size:clamp(19px,1.7vw,23px);font-weight:500;letter-spacing:-.02em;margin-bottom:16px;line-height:1.15;max-width:14ch;color:var(--fg)}\n.pillar p{color:var(--fg-dim);font-size:14px;line-height:1.7;margin-top:auto;max-width:28ch}\n\n\u002F* \u2500\u2500 HOW IT WORKS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.how-header{margin-bottom:80px}\n.how-header h2{font-size:clamp(40px,5vw,62px);font-weight:400;letter-spacing:-.035em;line-height:1.05;max-width:18ch;margin-bottom:20px}\n.how-header h2 em{font-family:'Instrument Serif',serif;font-style:italic}\n.how-header p{color:var(--fg-dim);font-size:17px;max-width:44ch;line-height:1.65}\n.flow{display:grid;grid-template-columns:1fr 32px 1fr 32px 1fr;align-items:stretch}\n.flow-step{\n  background:var(--bg2);border:1px solid var(--bord);border-radius:20px;padding:36px;\n  min-height:380px;display:flex;flex-direction:column;transition:border-color .3s;\n}\n.flow-step:hover{border-color:var(--bord-mid)}\n.snum{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--red);margin-bottom:14px;text-transform:uppercase}\n.flow-step h3{font-size:19px;font-weight:500;letter-spacing:-.015em;margin-bottom:16px;color:var(--fg)}\n.flow-step p{color:var(--fg-dim);font-size:13px;line-height:1.65}\n.flow-viz{margin-top:24px;flex:1;display:flex;align-items:center;justify-content:center;min-height:120px}\n.flow-arr{display:flex;align-items:center;justify-content:center;color:var(--fg-faint)}\n.ecg-line{stroke:var(--red);stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round}\n.ecg-grid line{stroke:var(--bord);stroke-width:.5}\n.feat-grid-sm{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;width:100%}\n.fgs-cell{aspect-ratio:1;background:var(--bg4);opacity:.4;border-radius:2px;transition:all .3s}\n.alert-chip-step{\n  width:100%;border:1px solid rgba(194,53,26,.28);background:rgba(194,53,26,.06);\n  padding:14px;border-radius:12px;font-family:'Geist Mono',monospace;\n}\n.acs-label{color:var(--red);font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}\n.acs-label::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--red);animation:pdot 1.2s infinite}\n.acs-msg{color:var(--fg);font-size:12px;line-height:1.5;font-family:'Geist',sans-serif}\n.acs-meta{margin-top:8px;color:var(--fg-faint);font-size:10px}\n\n\u002F* \u2500\u2500 DASHBOARD \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.dash-bg{background:var(--bg2)}\n.dash-intro{margin-bottom:64px}\n.dash-intro h2{font-size:clamp(40px,5vw,62px);font-weight:400;letter-spacing:-.035em;line-height:1.05;margin-bottom:20px;max-width:18ch}\n.dash-intro h2 em{font-family:'Instrument Serif',serif;font-style:italic}\n.dash-intro p{color:var(--fg-dim);font-size:17px;max-width:46ch;line-height:1.65}\n\n\u002F* Full-width monitor shell *\u002F\n.dash-shell{\n  background:var(--bg);border:1px solid var(--bord-mid);border-radius:24px;\n  overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.6),0 4px 20px rgba(0,0,0,.4);\n}\n.dash-topbar{\n  background:var(--bg2);border-bottom:1px solid var(--bord);\n  padding:14px 24px;display:flex;align-items:center;justify-content:space-between;\n}\n.dash-title{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:var(--fg);letter-spacing:-.01em}\n.dash-title svg{width:16px;height:16px;color:var(--red)}\n.dash-meta{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-faint);display:flex;align-items:center;gap:20px}\n.live-ind{display:flex;align-items:center;gap:6px;color:#22c55e}\n.live-ind .ld{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pdot 1.6s infinite}\n\n\u002F* Bento grid *\u002F\n.bento{display:grid;grid-template-columns:220px 1fr 1fr 200px;grid-template-rows:auto auto;gap:12px;padding:16px}\n\n.bc{\n  background:var(--bg2);border:1px solid var(--bord);border-radius:16px;\n  padding:24px;overflow:hidden;transition:border-color .3s;\n}\n.bc:hover{border-color:var(--bord-mid)}\n.bc.dark-card{background:var(--bg);border-color:var(--bord)}\n.bc.red-card{background:rgba(194,53,26,.06);border-color:rgba(194,53,26,.22)}\n\n.bc-lbl{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:10px}\n.bc-title{font-size:14px;font-weight:600;color:var(--fg);letter-spacing:-.01em;margin-bottom:0}\n\n\u002F* Bed list *\u002F\n.bed-list{display:flex;flex-direction:column;gap:5px;margin-top:14px}\n.bed-row-d{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;background:var(--bg3);font-size:12px;cursor:pointer;transition:background .15s}\n.bed-row-d:hover{background:var(--bg4)}\n.bed-row-d.act{background:rgba(194,53,26,.1);border:1px solid rgba(194,53,26,.2)}\n.brd-num{font-weight:700;color:var(--fg);min-width:44px;font-size:11px;font-family:'Geist Mono',monospace}\n.brd ts{display:flex;flex-direction:column;gap:8px;margin-top:14px}\n.da{padding:11px 13px;border-radius:10px;display:flex;align-items:flex-start;gap:9px}\n.da.w{background:rgba(194,53,26,.08);border:1px solid rgba(194,53,26,.22)}\n.da.c{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2)}\n.da-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}\n.da.w .da-dot{background:var(--red);animation:pdot 1.2s infinite}\n.da.c .da-dot{background:#f87171;animation:pdot 1s infinite}\n.da-body{flex:1}\n.da-title{font-size:11px;font-weight:600;color:var(--fg);margin-bottom:2px}\n.da-msg{font-size:10px;color:var(--fg-dim)}\n.da-time{font-family:'Geist Mono',monospace;font-size:9px;color:var(--fg-faint);flex-shrink:0}\n\n\u002F* Handover *\u002F\n.handover{display:flex;flex-direction:column;gap:0;margin-top:14px;grid-column:span 2}\n.hov-line{font-size:12px;color:var(--fg-dim);line-height:1.6;padding:9px 0;border-bottom:1px solid var(--bord)}\n.hov-line:last-child{border-bottom:none}\n.hov-line b{color:var(--fg);font-weight:600}\n\n\u002F* \u2500\u2500 FEATURES \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.feats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}\n.feat-card{\n  background:var(--bg2);border:1px solid var(--bord);border-radius:18px;\n  padding:40px 32px;display:flex;flex-direction:column;\n  transition:border-color .3s,transform .3s;\n}\n.feat-card:hover{border-color:var(--bord-mid);transform:translateY(-3px)}\n.feat-icon{width:30px;height:30px;color:var(--red);margin-bottom:24px}\n.feat-icon svg{width:100%;height:100%}\n.feat-card h3{font-size:17px;font-weight:500;letter-spacing:-.015em;margin-bottom:12px;color:var(--fg)}\n.feat-card p{color:var(--fg-dim);font-size:14px;line-height:1.72}\n\n\u002F* \u2500\u2500 TEAM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.team-bg{background:var(--bg2)}\n.team-h{font-size:clamp(40px,5vw,62px);font-weight:400;letter-spacing:-.035em;line-height:1.05;margin-bottom:80px}\n.team-h em{font-family:'Instrument Serif',serif;font-style:italic}\n.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}\n.team-card{background:var(--bg3);border:1px solid var(--bord);border-radius:20px;padding:40px;display:flex;gap:28px;align-items:center;transition:border-color .3s,transform .3s}\n.team-card:hover{border-color:var(--bord-mid);transform:translateY(-3px)}\n.avatar{width:76px;height:76px;flex-shrink:0;border-radius:50%;background:var(--bg4);border:1px solid var(--bord-mid);display:flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:13px;color:var(--red)}\n.team-card h3{font-size:17px;font-weight:600;margin-bottom:5px;color:var(--fg)}\n.team-role{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:12px}\n.team-card p{color:var(--fg-dim);font-size:14px;line-height:1.65;max-width:32ch}\n\n\u002F* \u2500\u2500 CONTACT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:100px;align-items:start}\n.contact-info h2{font-size:clamp(40px,5vw,62px);font-weight:400;letter-spacing:-.035em;line-height:1.05;margin-bottom:24px}\n.contact-info h2 em{font-family:'Instrument Serif',serif;font-style:italic}\n.contact-info p{color:var(--fg-dim);font-size:17px;line-height:1.72;margin-bottom:40px;max-width:38ch}\n.ch{border-top:1px solid var(--bord);padding:20px 0;display:flex;justify-content:space-between;align-items:center}\n.ch-lbl{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-faint)}\n.ch-val{font-size:14px;color:var(--fg)}\n.ch-badge{font-family:'Geist Mono',monospace;font-size:10px;color:var(--red);margin-left:8px;letter-spacing:.12em;text-transform:uppercase;padding:3px 9px;border:1px solid var(--red);border-radius:100px}\n.contact-form{background:var(--bg2);border:1px solid var(--bord-mid);border-radius:20px;padding:44px}\n.fg{margin-bottom:22px}\n.fg label{display:block;font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg-faint);margin-bottom:9px}\n.fg input,.fg textarea{width:100%;background:var(--bg3);border:1px solid var(--bord);border-radius:10px;color:var(--fg);font-family:'Geist',sans-serif;font-size:15px;padding:12px 16px;transition:border-color .2s,box-shadow .2s}\n.fg input:focus,.fg textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(194,53,26,.12)}\n.fg textarea{resize:vertical;min-height:110px}\n.form-status{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--red);margin-top:14px;opacity:0;transition:opacity .3s}\n.form-status.show{opacity:1}\n\n\u002F* \u2500\u2500 FOOTER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n.footer-inner{border-top:1px solid var(--bord);padding:40px 56px;max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;color:var(--fg-faint);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase}\n\n\u002F* \u2500\u2500 RESPONSIVE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 *\u002F\n@media(max-width:1024px){\n  .wrap{padding:100px 32px}\n  .award-grid{grid-template-columns:1fr;gap:48px}\n  .problem-grid{grid-template-columns:1fr;gap:60px}\n  .pillars{grid-template-columns:1fr}\n  .flow{grid-template-columns:1fr;gap:12px}\n  .flow-arr{transform:rotate(90deg)}\n  .bento{grid-template-columns:1fr 1fr;grid-template-rows:auto}\n  .ecg-wide-wrap{grid-column:span 2}\n  .feats-grid{grid-template-columns:1fr 1fr}\n  .team-grid{grid-template-columns:1fr}\n  .contact-grid{grid-template-columns:1fr;gap:56px}\n  nav{padding:18px 28px}nav.scrolled{padding:14px 28px}\n  .hero-content{padding:0 32px}\n  .hero-meta{left:28px;right:28px}\n  .stat-inner{padding:120px 32px}\n  .footer-inner{padding:32px 28px}\n}\n@media(max-width:680px){\n  .bento{grid-template-columns:1fr}\n  .ecg-wide-wrap,.handover{grid-column:span 1}\n  .feats-grid{grid-template-columns:1fr}\n  .team-card{flex-direction:column;text-align:center;gap:18px}\n  .stat-num{font-size:clamp(100px,25vw,160px)}\n  .footer-inner{flex-direction:column;gap:12px;text-align:center}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- NAV -->\n<nav id=\"nav\">\n  <a href=\"#\" class=\"logo-wrap\">\n    <span class=\"logo-mark\">\n      <svg viewBox=\"0 0 26 26\" fill=\"none\">\n        <circle cx=\"13\" cy=\"13\" r=\"11\" stroke=\"rgba(255,255,255,.55)\" stroke-width=\"1.2\"><\u002Fcircle>\n        <polyline points=\"2,13 7,13 9,7 12,19 15,9 17,13 24,13\" stroke=\"rgba(255,255,255,.8)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpolyline>\n      <\u002Fsvg>\n    <\u002Fspan>\n    <span class=\"logo-txt\">VitalSync<\u002Fspan>\n  <\u002Fa>\n  <a href=\"#contact\" class=\"nav-cta\">Request demo<\u002Fa>\n<\u002Fnav>\n\n<!-- HERO -->\n<section class=\"hero\" id=\"hero\">\n  <div class=\"hero-bg-video\" style=\"position:absolute;inset:0;z-index:0;overflow:hidden;\"><video autoplay loop muted playsinline webkit-playsinline x5-playsinline style=\"width:100%;height:100%;object-fit:cover;opacity:0.5;\"><source src=\"\u002Fvideo\u002Fd_e_c_cf_d_e_a_amp_.mp4\" type=\"video\u002Fmp4\" \u002F><\u002Fvideo><\u002Fdiv>\n  <div class=\"hero-content\">\n    <div class=\"hero-eye rv\">ICU Monitoring &nbsp;\u00b7&nbsp; Edge AI<\u002Fdiv>\n    <h1 class=\"hero-h rv d1\">\n      <span class=\"hl-s\">Quieter alarms.<\u002Fspan>\n      <span class=\"hl-i\"><em class=\"hl-r\">Sharper<\u002Fem> signals.<\u002Fspan>\n    <\u002Fh1>\n    <p class=\"hero-sub rv d2\">AI-powered ICU monitoring for rural Asia-Pacific hospitals cutting through the noise, catching what matters, running without the internet.<\u002Fp>\n    <div class=\"cta-row rv d3\">\n      <a href=\"#stream\" class=\"btn btn-white\">See the problem <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 5v14M5 12l7 7 7-7\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <a href=\"#contact\" class=\"btn btn-ghost-w\">Request a demo<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hero-meta\">\n    <span><span class=\"pdot\"><\u002Fspan>System status \u00b7 Nominal<\u002Fspan>\n    <span>v0.9.2 \u00b7 Edge build<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"scroll-hint\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M12 5v14M5 12l7 7 7-7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ALARM STREAM attention catch -->\n<div class=\"alarm-stream-section\" id=\"stream\">\n  <div class=\"stream-label\">A single shift. A single ward. This is what it sounds like. &nbsp;<em>Most of it means nothing.<\u002Fem><\u002Fdiv>\n  <div class=\"stream-track\">\n    <div class=\"stream-row r1\" id=\"streamR1\"><\u002Fdiv>\n    <div class=\"stream-row r2\" id=\"streamR2\"><\u002Fdiv>\n    <div class=\"stream-row r3\" id=\"streamR3\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stream-caption\">Nurses hear <b>hundreds of alarms every shift.<\u002Fb><br>The one that actually matters gets lost in the pile.<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- AWARD -->\n<div class=\"s award-wrap\" id=\"award\">\n  <div class=\"wrap\">\n    <div class=\"award-grid\">\n      <div>\n        <div class=\"award-tag rv\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M8 21h8M12 17v4M17 3H7l1 8c0 2.2 1.8 4 4 4s4-1.8 4-4l1-8z\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M7 3H4c0 3 1.5 5.5 3 7M17 3h3c0 3-1.5 5.5-3 7\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <span>2026 \u00b7 Global Competition<\u002Fspan>\n        <\u002Fdiv>\n        <h2 class=\"award-h rv d1\"><strong>Representing Malaysia<\u002Fstrong><br>on the global stage.<\u002Fh2>\n        <p class=\"award-body rv d2\">We built VitalSync to solve a problem we kept hearing about from clinicians in rural hospitals. Last month, it won the <b>2026 Harvard HSIL Hackathon Malaysia Hub<\u002Fb>. Now we're taking it to the global finals.<\u002Fp>\n        <div class=\"award-global rv d3\"><span class=\"dot\"><\u002Fspan> Competing at the HSIL Global Finals<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"award-cards rv-r d1\">\n        <img src=\".\u002Fimage\u002Fwinner.jpg\" style=\"width:100%; border-radius:16px; border:1px solid var(--bord-mid); object-fit:cover; display:block;\" \u002F>\n        \n        <div class=\"acard\">\n          <div class=\"acard-icon\" style=\"background:transparent;\"><img src=\".\u002Fimage\u002Fharvard.png\" style=\"width:100%;height:100%;object-fit:contain;\" \u002F><\u002Fdiv>\n          <div class=\"acard-body\"><div class=\"acard-name\">Harvard T.H. Chan School of Public Health<\u002Fdiv><div class=\"acard-sub\">Boston, Massachusetts<\u002Fdiv><\u002Fdiv>\n          <div class=\"acard-badge\">Partner<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"acard\">\n          <div class=\"acard-icon red\">HSIL<\u002Fdiv>\n          <div class=\"acard-body\"><div class=\"acard-name\">Health System Innovation Lab<\u002Fdiv><div class=\"acard-sub\">Malaysia Hub \u00b7 2026 Winner<\u002Fdiv><\u002Fdiv>\n          <div class=\"acard-badge\">\ud83c\udfc6 1st Place<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CINEMATIC STAT -->\n<div class=\"s stat-section\" id=\"stat\">\n  <div class=\"alarm-grid-bg\" id=\"alarmGridBg\"><\u002Fdiv>\n  <div class=\"stat-inner rv-sc\">\n    <div class=\"stat-num-wrap\">\n      <div class=\"stat-ring\"><\u002Fdiv>\n      <div class=\"stat-ring\"><\u002Fdiv>\n      <div class=\"stat-ring\"><\u002Fdiv>\n      <div class=\"stat-num\"><em id=\"statCount\">72<\u002Fem>\u2013<em>99<\u002Fem><sup>%<\u002Fsup><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-label\">of ICU alarms are false positives. Every single shift. In every hospital.<\u002Fdiv>\n    <div class=\"stat-sub\">Across multiple peer-reviewed clinical studies \u00b7 ICU alarm fatigue \u00b7 2020\u20132024<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PROBLEM -->\n<div class=\"s\" id=\"problem\">\n  <div class=\"wrap\">\n    <div class=\"problem-grid\">\n      <!-- Animated ICU monitor visual -->\n      <div class=\"rv-l\">\n        <div class=\"icu-monitor-viz\">\n          <div class=\"icu-monitor-header\">\n            <span class=\"icu-bed-label\">ICU Ward A \u00b7 Bed 07 \u00b7 Ahmad R.<\u002Fspan>\n            <span class=\"icu-time\" id=\"icuClock\">03:42:18<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"icu-ecg-wrap\">\n            <div class=\"icu-ecg-label\"><span>ECG Lead II<\u002Fspan><span class=\"bpm\">104 bpm<\u002Fspan><\u002Fdiv>\n            <svg id=\"icuEcg\" viewBox=\"0 0 400 56\" preserveAspectRatio=\"none\">\n              <path id=\"icuEcgPath\" fill=\"none\" stroke=\"#C2351A\" stroke-width=\"1.4\" stroke-linecap=\"round\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div class=\"icu-vitals\">\n            <div class=\"icu-vital\"><div class=\"iv-lbl\">SpO\u2082<\u002Fdiv><div class=\"iv-val bad\">93<span class=\"iv-unit\">%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"icu-vital\"><div class=\"iv-lbl\">HR<\u002Fdiv><div class=\"iv-val bad\">104<span class=\"iv-unit\">bpm<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"icu-vital\"><div class=\"iv-lbl\">RR<\u002Fdiv><div class=\"iv-val bad\">22<span class=\"iv-unit\">\u002Fmin<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"icu-vital\"><div class=\"iv-lbl\">Sys BP<\u002Fdiv><div class=\"iv-val bad\">98<span class=\"iv-unit\">mmHg<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"icu-alarms\" id=\"icuAlarms\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Copy + beeping bars -->\n      <div class=\"alarm-copy rv-r d1\">\n        <div class=\"ew\">01 \u00b7 The Problem<\u002Fdiv>\n        <h2>Alarm fatigue is <em>killing<\u002Fem> attention and patients.<\u002Fh2>\n        <p>Nurses in a busy ICU get hit with <b>hundreds of alarms every shift.<\u002Fb> Loose leads, a patient rolling over, thresholds that were set for someone else months ago. Constant noise.<\u002Fp>\n        <p>After a while, the beeping becomes background. Staff start tuning it out not because they don't care, but because they have no way to tell which alarm actually matters.<\u002Fp>\n        <p>In rural hospitals, this hits differently. Fewer staff, more patients per bed, and no reliable internet to pull in cloud tools. <b>By the time a real deterioration shows up, it looks just like the last 200 false alarms.<\u002Fb><\u002Fp>\n        <div class=\"alarm-viz-wrap\">\n          <div class=\"alarm-bars-animated\" id=\"beepBars\"><\u002Fdiv>\n          <div class=\"alarm-legend\">\n            <span><span class=\"dot\" style=\"background:var(--bg4)\"><\u002Fspan>False alarm<\u002Fspan>\n            <span><span class=\"dot\" style=\"background:var(--red)\"><\u002Fspan>Clinically meaningful<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- SOLUTION -->\n<div class=\"s sol-bg\" id=\"solution\">\n  <div class=\"wrap\">\n    <div class=\"ew rv\">02 \u00b7 The Solution<\u002Fdiv>\n    <div class=\"sol-intro rv d1\">\n      <h2>A second set of eyes that<br><em>never gets tired.<\u002Fem><\u002Fh2>\n      <p>VitalSync sits between the bedside monitor and the clinical team. It watches every patient continuously, learns what normal looks like for each of them, and only sends an alert when something is genuinely wrong.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pillars\">\n      <div class=\"pillar rv d1\"><div class=\"pnum\">01 \u002F Filter<\u002Fdiv><h3>Stop the noise before it reaches anyone.<\u002Fh3><p>Motion artefact. Loose leads. Threshold crossings that don't mean anything for this particular patient. We catch those before they ever fire.<\u002Fp><\u002Fdiv>\n      <div class=\"pillar rv d2\"><div class=\"pnum\">02 \u002F Predict<\u002Fdiv><h3>Catch deterioration hours before it turns critical.<\u002Fh3><p>Trained on 200,000 real ICU admissions. The model picks up multi-variate drift that humans miss sepsis, respiratory decline, cardiac instability.<\u002Fp><\u002Fdiv>\n      <div class=\"pillar rv d3\"><div class=\"pnum\">03 \u002F Deploy<\u002Fdiv><h3>No internet required. No data leaves the ward.<\u002Fh3><p>A single $400 mini-PC at the nurse's station runs everything. No cloud dependency. No vendor contract. Just works, even in a basement with no signal.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- HOW IT WORKS -->\n<div class=\"s\" id=\"how\">\n  <div class=\"wrap\">\n    <div class=\"ew rv\">03 \u00b7 How it works<\u002Fdiv>\n    <div class=\"how-header rv d1\">\n      <h2>Three steps from raw waveform<br>to <em>actionable alert.<\u002Fem><\u002Fh2>\n      <p>A quiet pipeline running on every bed, every second from the moment vitals come in to the moment a clinician gets something worth acting on.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"flow\">\n      <div class=\"flow-step rv d1\">\n        <div class=\"snum\">Step 01 \u00b7 Ingest<\u002Fdiv>\n        <h3>Vitals stream in, every second.<\u002Fh3>\n        <p>HR, SpO\u2082, BP, respiratory rate, temperature and ECG pulled from standard bedside monitors via HL7 or serial. No new hardware needed.<\u002Fp>\n        <div class=\"flow-viz\">\n          <div style=\"width:100%;height:80px\">\n            <svg viewBox=\"0 0 200 80\" preserveAspectRatio=\"none\" style=\"width:100%;height:100%\">\n              <g class=\"ecg-grid\"><line x1=\"0\" y1=\"20\" x2=\"200\" y2=\"20\"><\u002Fline><line x1=\"0\" y1=\"40\" x2=\"200\" y2=\"40\"><\u002Fline><line x1=\"0\" y1=\"60\" x2=\"200\" y2=\"60\"><\u002Fline><\u002Fg>\n              <path class=\"ecg-line\" id=\"ecgPath\" d=\"\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-arr rv d2\"><svg viewBox=\"0 0 24 12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M1 6h21M17 1l5 5-5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"flow-step rv d2\">\n        <div class=\"snum\">Step 02 \u00b7 Analyse<\u002Fdiv>\n        <h3>AI runs 31 features across trend windows.<\u002Fh3>\n        <p>Under 200ms per patient. The model runs entirely on local hardware no outbound calls, no latency from the cloud, no data leaving the building.<\u002Fp>\n        <div class=\"flow-viz\"><div class=\"feat-grid-sm\" id=\"featureGrid\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"flow-arr rv d3\"><svg viewBox=\"0 0 24 12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M1 6h21M17 1l5 5-5 5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <div class=\"flow-step rv d3\">\n        <div class=\"snum\">Step 03 \u00b7 Surface<\u002Fdiv>\n        <h3>One alert. The one that matters.<\u002Fh3>\n        <p>Each notification comes with a NEWS2 score, trend context, and a suggested next step. False positives cut by an order of magnitude.<\u002Fp>\n        <div class=\"flow-viz\">\n          <div class=\"alert-chip-step\" style=\"width:100%\">\n            <div class=\"acs-label\">Deterioration \u00b7 Bed 07<\u002Fdiv>\n            <div class=\"acs-msg\">Rising NEWS2 + declining SpO\u2082 over 40 min. Multi-variate pattern consistent with early sepsis. Consider reassessment.<\u002Fdiv>\n            <div class=\"acs-meta\">Confidence 0.91 \u00b7 NEWS2 \u2192 6 \u00b7 03:38<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- DASHBOARD -->\n<div class=\"s dash-bg\" id=\"dashboard\">\n  <div class=\"wrap\" style=\"padding-bottom:0\">\n    <div class=\"dash-intro\">\n      <div class=\"ew rv\">04 \u00b7 The Interface<\u002Fdiv>\n      <h2 class=\"rv d1\"><em>Mission control<\u002Fem><br>for the ward.<\u002Fh2>\n      <p class=\"rv d2\">Every bed. Every alert. Every trend. One screen that actually makes sense at 3am.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"max-width:1440px;margin:0 auto;padding:40px 40px 160px\">\n    <div class=\"dash-shell rv-sc d1\">\n      <div class=\"dash-topbar\">\n        <div class=\"dash-title\">\n          <svg viewBox=\"0 0 22 22\" fill=\"none\"><circle cx=\"11\" cy=\"11\" r=\"9.5\" stroke=\"#C2351A\" stroke-width=\"1.2\"><\u002Fcircle><polyline points=\"3,11 7,11 8.5,7 10.5,15 12.5,9 14,11 19,11\" stroke=\"#C2351A\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpolyline><\u002Fsvg>\n          VitalSync Dashboard\n        <\u002Fdiv>\n        <div class=\"dash-meta\">\n          <span class=\"live-ind\"><span class=\"ld\"><\u002Fspan>Live<\u002Fspan>\n          <span>ICU Ward A \u00b7 12 Beds<\u002Fspan>\n          <span id=\"dashClock\">03:42:17<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"bento\">\n        <!-- Bed list -->\n        <div class=\"bc\" style=\"grid-row:span 2\">\n          <div class=\"bc-lbl\">Ward A \u00b7 All Beds<\u002Fdiv>\n          <div class=\"bc-title\">Patient Overview<\u002Fdiv>\n          <div class=\"bed-list\">\n            <div class=\"bed-row-d act\"><span class=\"brd-num\">Bed 07<\u002Fspan><span class=\"brd-name\">Ahmad R.<\u002Fspan><span class=\"brd-score wn\">6<\u002Fspan><\u002Fdiv>\n            <div class=\"bed-row-d\"><span class=\"brd-num\">Bed 02<\u002Fspan><span class=\"brd-name\">Siti N.<\u002Fspan><span class=\"brd-score ok\">2<\u002Fspan><\u002Fdiv>\n            <div class=\"bed-row-d\"><span class=\"brd-num\">Bed 05<\u002Fspan><span class=\"brd-name\">Ravi K.<\u002Fspan><span class=\"brd-score ok\">1<\u002Fspan><\u002Fdiv>\n            <div class=\"bed-row-d\"><span class=\"brd-num\">Bed 09<\u002Fspan><span class=\"brd-name\">Lim H.C.<\u002Fspan><span class=\"brd-score cr\">8<\u002Fspan><\u002Fdiv>\n            <div class=\"bed-row-d\"><span class=\"brd-num\">Bed 11<\u002Fspan><span class=\"brd-name\">Fatimah Z.<\u002Fspan><span class=\"brd-score ok\">3<\u002Fspan><\u002Fdiv>\n            <div class=\"bed-row-d\"><span class=\"brd-num\">Bed 03<\u002Fspan><span class=\"brd-name\">Hassan M.<\u002Fspan><span class=\"brd-score ok\">2<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- ECG wide -->\n        <div class=\"bc ecg-wide-wrap\">\n          <div class=\"bc-lbl\">ECG Lead II Real-time \u00b7 Ahmad Razali \u00b7 Bed 07<\u002Fdiv>\n          <div class=\"bc-title\" style=\"display:flex;justify-content:space-between;align-items:center\"><span>Continuous waveform<\u002Fspan><span style=\"font-family:'Geist Mono',monospace;font-size:12px;color:var(--red)\">104 bpm<\u002Fspan><\u002Fdiv>\n          <svg id=\"dashEcg\" viewBox=\"0 0 600 72\" preserveAspectRatio=\"none\">\n            <path id=\"dashEcgPath\" fill=\"none\" stroke=\"#C2351A\" stroke-width=\"1.5\" stroke-linecap=\"round\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <!-- NEWS2 -->\n        <div class=\"bc red-card\">\n          <div class=\"bc-lbl\">NEWS2 Score \u00b7 Bed 07<\u002Fdiv>\n          <div class=\"news2-display\"><div class=\"n2\">6<\u002Fdiv><div class=\"n2-lbl\">NEWS2<\u002Fdiv><div class=\"n2-sub\">Trending upward<br>4 \u2192 6 over 40 min<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Big vital -->\n        <div class=\"bc dark-card\">\n          <div class=\"bc-lbl\">Heart Rate \u00b7 Bed 07<\u002Fdiv>\n          <div class=\"bv\"><div class=\"bv-val\">104<span class=\"bv-unit\">bpm<\u002Fspan><\u002Fdiv><div class=\"bv-lbl\">Ahmad Razali \u00b7 Continuous<\u002Fdiv><div class=\"bv-trend\">\u2191 +8 vs 1h ago \u00b7 Elevated<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Vitals -->\n        <div class=\"bc\">\n          <div class=\"bc-lbl\">Vitals \u00b7 Bed 07<\u002Fdiv>\n          <div class=\"vitals-4\">\n            <div class=\"vit\"><div class=\"vt-lbl\">SpO\u2082<\u002Fdiv><div class=\"vt-val\">93<span class=\"vt-unit\">%<\u002Fspan><\u002Fdiv><div class=\"vt-trend bad\">\u2193 \u22124%<\u002Fdiv><\u002Fdiv>\n            <div class=\"vit\"><div class=\"vt-lbl\">Resp<\u002Fdiv><div class=\"vt-val\">22<span class=\"vt-unit\">\u002Fmin<\u002Fspan><\u002Fdiv><div class=\"vt-trend bad\">\u2191 high<\u002Fdiv><\u002Fdiv>\n            <div class=\"vit\"><div class=\"vt-lbl\">Sys BP<\u002Fdiv><div class=\"vt-val\">98<span class=\"vt-unit\">mmHg<\u002Fspan><\u002Fdiv><div class=\"vt-trend bad\">\u2193 low<\u002Fdiv><\u002Fdiv>\n            <div class=\"vit\"><div class=\"vt-lbl\">Temp<\u002Fdiv><div class=\"vt-val\">38<span class=\"vt-unit\">\u00b0C<\u002Fspan><\u002Fdiv><div class=\"vt-trend bad\">\u2191 fever<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Alerts -->\n        <div class=\"bc\">\n          <div class=\"bc-lbl\">Active Alerts<\u002Fdiv>\n          <div class=\"dash-alerts\">\n            <div class=\"da w\"><span class=\"da-dot\"><\u002Fspan><div class=\"da-body\"><div class=\"da-title\">Deterioration Risk \u00b7 Bed 07<\u002Fdiv><div class=\"da-msg\">Rising NEWS2 + SpO\u2082 decline. Sepsis pattern.<\u002Fdiv><\u002Fdiv><div class=\"da-time\">03:38<\u002Fdiv><\u002Fdiv>\n            <div class=\"da c\"><span class=\"da-dot\"><\u002Fspan><div class=\"da-body\"><div class=\"da-title\">Critical \u00b7 Bed 09<\u002Fdiv><div class=\"da-msg\">NEWS2 score 8 immediate attention.<\u002Fdiv><\u002Fdiv><div class=\"da-time\">03:41<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- Handover -->\n        <div class=\"bc handover\">\n          <div class=\"bc-lbl\">AI Shift Handover \u00b7 Generated 06:00<\u002Fdiv>\n          <div class=\"bc-title\" style=\"margin-bottom:12px\">Ward A 6 patients, 2 requiring attention<\u002Fdiv>\n          <div class=\"hov-line\"><b>Bed 07 Ahmad R.<\u002Fb> NEWS2 trending up (4\u21926). SpO\u2082 declining. Sepsis pattern. Needs review at handover.<\u002Fdiv>\n          <div class=\"hov-line\"><b>Bed 09 Lim H.C.<\u002Fb> Critical NEWS2 score 8. ICU consultant alerted. Escalation pending.<\u002Fdiv>\n          <div class=\"hov-line\"><b>Beds 02, 03, 05, 11<\u002Fb> Stable overnight. Routine monitoring is fine.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- FEATURES -->\n<div class=\"s\" id=\"features\">\n  <div class=\"wrap\">\n    <div class=\"ew rv\">05 \u00b7 Features<\u002Fdiv>\n    <h2 class=\"rv d1\" style=\"font-size:clamp(40px,5vw,62px);font-weight:400;letter-spacing:-.035em;line-height:1.05;margin-bottom:72px;max-width:18ch\">Everything the ward needs.<br><em style=\"font-family:'Instrument Serif',serif;font-style:italic\">Nothing it doesn't.<\u002Fem><\u002Fh2>\n    <div class=\"feats-grid\">\n      <div class=\"feat-card rv d1\"><div class=\"feat-icon\"><svg viewBox=\"0 0 36 36\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M3 18h6l3-10 6 20 3-14 3 8 4-4h5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3>Live ECG &amp; vitals dashboard<\u002Fh3><p>Every bed, every waveform, one screen. Refreshes at 60 fps with no lag, even on a $400 mini-PC.<\u002Fp><\u002Fdiv>\n      <div class=\"feat-card rv d2\"><div class=\"feat-icon\"><svg viewBox=\"0 0 36 36\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"18\" cy=\"18\" r=\"12\"><\u002Fcircle><path d=\"M12 18l4 4 8-8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3>ML deterioration prediction<\u002Fh3><p>Up to six hours of early warning for sepsis, respiratory and cardiac decline before symptoms become obvious.<\u002Fp><\u002Fdiv>\n      <div class=\"feat-card rv d3\"><div class=\"feat-icon\"><svg viewBox=\"0 0 36 36\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M6 10h24M6 18h16M6 26h20\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"30\" cy=\"26\" r=\"2\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><h3>AI shift handover summaries<\u002Fh3><p>Auto-generated at every shift change what happened, who to watch, what's next. Saves 20 minutes of scrambling.<\u002Fp><\u002Fdiv>\n      <div class=\"feat-card rv d2\"><div class=\"feat-icon\"><svg viewBox=\"0 0 36 36\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><rect x=\"6\" y=\"10\" width=\"24\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M14 30h8M18 26v4\" stroke-linecap=\"round\"><\u002Fpath><circle cx=\"12\" cy=\"18\" r=\"1.5\" fill=\"currentColor\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><h3>Offline-first edge deployment<\u002Fh3><p>No cloud, no internet, no data leaving the building. Works in a basement. Works during a blackout. Just works.<\u002Fp><\u002Fdiv>\n      <div class=\"feat-card rv d3\"><div class=\"feat-icon\"><svg viewBox=\"0 0 36 36\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><circle cx=\"18\" cy=\"18\" r=\"12\"><\u002Fcircle><path d=\"M18 11v7l4 4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3>NEWS2 clinical scoring<\u002Fh3><p>The validated UK standard early-warning score calculated in real time for every patient, not just the ones flagged.<\u002Fp><\u002Fdiv>\n      <div class=\"feat-card rv d4\"><div class=\"feat-icon\"><svg viewBox=\"0 0 36 36\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><rect x=\"12\" y=\"4\" width=\"12\" height=\"28\" rx=\"2\"><\u002Frect><path d=\"M16 28h4\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fdiv><h3>Works on any screen<\u002Fh3><p>Wall display, tablet at the bedside, or a phone in your pocket. The same interface adapts to wherever the team is working.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- TEAM -->\n<div class=\"s team-bg\" id=\"team\">\n  <div class=\"wrap\">\n    <div class=\"ew rv\">06 \u00b7 Team<\u002Fdiv>\n    <h2 class=\"team-h rv d1\">Two people.<br><em>One problem worth solving.<\u002Fem><\u002Fh2>\n    <div class=\"team-grid\">\n      <div class=\"team-card rv-l d1\"><div class=\"avatar\" style=\"background-image:url('.\u002Fimage\u002Fpfp\u002Fabder.png'); background-size:cover; background-position:center; color:transparent;\">T1<\u002Fdiv><div><h3>Abderrahman<\u002Fh3><div class=\"team-role\">ML &amp; Backend<\u002Fdiv><p>Built the model architecture, edge inference pipeline, and sourced and cleaned the 200,000-admission training set.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"team-card rv-r d2\"><div class=\"avatar\" style=\"background-image:url('.\u002Fimage\u002Fpfp\u002Fpfp5.png'); background-size:cover; background-position:center; color:transparent;\">T2<\u002Fdiv><div><h3>Hamizan Naeem<\u002Fh3><div class=\"team-role\">Frontend &amp; Systems<\u002Fdiv><p>Designed the bedside and ward-level interface, wired up the device integrations, and made the whole thing run on low-power hardware.<\u002Fp><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CONTACT -->\n<div class=\"s\" id=\"contact\">\n  <div class=\"wrap\">\n    <div class=\"contact-grid\">\n      <div class=\"rv-l\">\n        <div class=\"ew\">07 \u00b7 Contact<\u002Fdiv>\n        <h2>Talk to us about<br><em>a pilot.<\u002Fem><\u002Fh2>\n        <p>We're looking for rural and regional hospital partners across Asia-Pacific anywhere that has bedside monitors, a nurse's station, and a problem worth solving.<\u002Fp>\n        <div class=\"ch\"><span class=\"ch-lbl\">Email<\u002Fspan><span class=\"ch-val\">vitalsync.my@gmail.com<\u002Fspan><\u002Fdiv>\n        <div class=\"ch\"><span class=\"ch-lbl\">Based in<\u002Fspan><span class=\"ch-val\">Kuala Lumpur \u00b7 Asia-Pacific<\u002Fspan><\u002Fdiv>\n        <div class=\"ch\"><span class=\"ch-lbl\">Status<\u002Fspan><span class=\"ch-val\">Pilot-stage \u00b7 accepting partners<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <form class=\"contact-form rv-r d1\" id=\"contactForm\" novalidate=\"\">\n        <div class=\"fg\"><label for=\"name\">Name<\u002Flabel><input id=\"name\" name=\"name\" type=\"text\" placeholder=\"Dr. Nur Aisha\" required=\"\"><\u002Fdiv>\n        <div class=\"fg\"><label for=\"email\">Email<\u002Flabel><input id=\"email\" name=\"email\" type=\"email\" placeholder=\"you@hospital.org\" required=\"\"><\u002Fdiv>\n        <div class=\"fg\"><label for=\"message\">Message<\u002Flabel><textarea id=\"message\" name=\"message\" placeholder=\"Tell us about your ward beds, current monitors, and what you'd want to test first\u2026\" required=\"\"><\u002Ftextarea><\u002Fdiv>\n        <button type=\"submit\" class=\"btn btn-red\">Send message <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <div class=\"form-status\" id=\"formStatus\">Got it we'll be in touch shortly.<\u002Fdiv>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"footer-inner\">\n  <span>\u00a9 2026 Yaqeen Health \u00b7 VitalSync<\u002Fspan>\n  <span>Built for the edge \u00b7 Malaysia<\u002Fspan>\n<\u002Fdiv>\n\n<script>\n\u002F\u002F \u2500\u2500 NAV \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst nav = document.getElementById('nav');\nconst hero = document.querySelector('.hero');\nfunction updNav() {\n  const b = hero.getBoundingClientRect().bottom;\n  nav.classList.toggle('scrolled', b <= 60);\n}\nwindow.addEventListener('scroll', updNav, {passive:true});\nupdNav();\n\n\u002F\u002F \u2500\u2500 REVEALS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst io = new IntersectionObserver(entries => {\n  entries.forEach(e => { if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);} });\n}, {threshold:0.08});\ndocument.querySelectorAll('.rv,.rv-l,.rv-r,.rv-sc').forEach(el=>io.observe(el));\n\n\u002F\u002F \u2500\u2500 ALARM STREAM \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nconst falseAlarms = [\n  'HR > 100 \u00b7 Bed 02','SpO\u2082 < 95 \u00b7 Bed 07','Lead off \u00b7 Bed 11','NIBP high \u00b7 Bed 05',\n  'RR > 20 \u00b7 Bed 09','Apnea \u00b7 Bed 03','HR > 100 \u00b7 Bed 07','SpO\u2082 < 95 \u00b7 Bed 11',\n  'Motion artefact \u00b7 Bed 04','Lead off \u00b7 Bed 06','Sys BP high \u00b7 Bed 08','Tachy \u00b7 Bed 10',\n  'HR > 100 \u00b7 Bed 01','Probe off \u00b7 Bed 12','NIBP retry \u00b7 Bed 05','RR high \u00b7 Bed 02',\n  'Lead off \u00b7 Bed 09','SpO\u2082 drop \u00b7 Bed 03','HR > 100 \u00b7 Bed 04','NIBP high \u00b7 Bed 07',\n];\nconst realAlarms = ['Deterioration \u00b7 Bed 07','NEWS2 \u2191 \u00b7 Bed 09'];\n\nfunction makeRow(ids, alarmSet, realSet, rowClass) {\n  const row = document.getElementById(ids);\n  if(!row) return;\n  const items = [];\n  for(let i=0;i<40;i++) {\n    const isReal = realSet && i % 18 === 7;\n    const txt = isReal ? realSet[i % realSet.length] : alarmSet[i % alarmSet.length];\n    items.push({txt, isReal});\n  }\n  \u002F\u002F Double for seamless loop\n  [...items, ...items].forEach(({txt, isReal}) => {\n    const chip = document.createElement('div');\n    chip.className = 'alarm-chip' + (isReal ? ' real' : '');\n    chip.innerHTML = `<span class=\"cdot\"><\u002Fspan>${txt}`;\n    row.appendChild(chip);\n  });\n}\nmakeRow('streamR1', falseAlarms, realAlarms, 'r1');\nmakeRow('streamR2', falseAlarms, null, 'r2');\nmakeRow('streamR3', falseAlarms, realAlarms, 'r3');\n\n\u002F\u002F \u2500\u2500 ALARM GRID BACKGROUND \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n(() => {\n  const grid = document.getElementById('alarmGridBg');\n  if(!grid) return;\n  const ROWS = 8, COLS = 20, TOTAL = ROWS * COLS;\n  const REAL_SLOTS = new Set([23,47,71,103,139]);\n  const cells = [];\n  for(let i=0;i<TOTAL;i++) {\n    const cell = document.createElement('div');\n    cell.className = 'agb-cell';\n    const dot = document.createElement('div');\n    dot.className = 'agb-dot';\n    if(REAL_SLOTS.has(i)) {\n      dot.classList.add('active');\n      dot.style.setProperty('--dur', (.6+Math.random()*.6)+'s');\n    }\n    cell.appendChild(dot);\n    grid.appendChild(cell);\n    cells.push(dot);\n  }\n  \u002F\u002F Randomly fire false alarm dots\n  function randomFire() {\n    const nonReal = cells.filter((_,i)=>!REAL_SLOTS.has(i));\n    const pick = nonReal[Math.floor(Math.random()*nonReal.length)];\n    pick.classList.add('active');\n    pick.style.setProperty('--dur', (.2+Math.random()*.3)+'s');\n    setTimeout(()=>pick.classList.remove('active'), 300+Math.random()*500);\n  }\n  setInterval(randomFire, 120);\n})();\n\n\u002F\u002F \u2500\u2500 ECG BUILDER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction buildEcg(id, W, MID, beats, dur) {\n  const path = document.getElementById(id);\n  if(!path) return;\n  const bW = W\u002Fbeats; let d = `M 0 ${MID}`;\n  for(let b=0;b<beats;b++) {\n    const x = b*bW;\n    d+=` L${x+bW*.10} ${MID} L${x+bW*.20} ${MID-4} L${x+bW*.28} ${MID}`;\n    d+=` L${x+bW*.34} ${MID+4} L${x+bW*.38} ${MID-22} L${x+bW*.42} ${MID+9}`;\n    d+=` L${x+bW*.48} ${MID} L${x+bW*.62} ${MID-5} L${x+bW*.76} ${MID} L${x+bW} ${MID}`;\n  }\n  path.setAttribute('d', d);\n  const len = path.getTotalLength();\n  path.style.strokeDasharray = len;\n  path.style.strokeDashoffset = len;\n  let start = null;\n  (function tick(ts) {\n    if(!start) start = ts;\n    path.style.strokeDashoffset = len*(1-((ts-start)\u002Fdur)%1);\n    requestAnimationFrame(tick);\n  })(performance.now());\n}\nbuildEcg('ecgPath',   200, 40, 4, 2800);\nbuildEcg('icuEcgPath',400, 28, 6, 3500);\nbuildEcg('dashEcgPath',600,36, 8, 4200);\n\n\u002F\u002F \u2500\u2500 FEATURE GRID SHIMMER \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n(() => {\n  const g = document.getElementById('featureGrid');\n  if(!g) return;\n  const cells=[];\n  for(let i=0;i<32;i++){const c=document.createElement('div');c.className='fgs-cell';g.appendChild(c);cells.push(c);}\n  function pulse(){cells.forEach(c=>{const on=Math.random()<.35;c.style.opacity=on?.45+Math.random()*.55:.12;c.style.background=on?'var(--red)':'var(--bg4)';});}\n  pulse();setInterval(pulse,1400);\n})();\n\n\u002F\u002F \u2500\u2500 BEEPING ALARM BARS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n(() => {\n  const container = document.getElementById('beepBars');\n  if(!container) return;\n  const TOTAL = 72;\n  const REAL = new Set([18, 44, 61]);\n  const bars = [];\n  for(let i=0;i<TOTAL;i++){\n    const b = document.createElement('div');\n    b.className = 'aba-bar' + (REAL.has(i) ? ' real' : '');\n    container.appendChild(b);\n    bars.push({el:b, isReal:REAL.has(i), phase:Math.random()*Math.PI*2, freq:.8+Math.random()*1.2});\n  }\n  let t=0;\n  function animBars() {\n    t += 0.04;\n    bars.forEach(({el, isReal, phase, freq}) => {\n      if(isReal) {\n        \u002F\u002F Real alarms: dramatic pulse\n        const pulse = .5+.5*Math.sin(t*freq*3+phase);\n        el.style.height = (32 + pulse*28)+'px';\n        el.style.boxShadow = `0 0 ${8+pulse*12}px rgba(194,53,26,${.3+pulse*.5})`;\n      } else {\n        \u002F\u002F False alarms: random noise oscillation\n        const noise = .5+.5*Math.sin(t*freq+phase);\n        el.style.height = (6+noise*28)+'px';\n      }\n    });\n    requestAnimationFrame(animBars);\n  }\n  animBars();\n})();\n\n\u002F\u002F \u2500\u2500 ICU ALARMS (animated beep list) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n(() => {\n  const container = document.getElementById('icuAlarms');\n  if(!container) return;\n  const alarmData = [\n    {txt:'SpO\u2082 < 95%',time:'03:41',real:false},\n    {txt:'HR > 100 bpm Motion artefact',time:'03:41',real:false},\n    {txt:'Lead II off',time:'03:40',real:false},\n    {txt:'Deterioration risk NEWS2 \u2191',time:'03:38',real:true},\n    {txt:'NIBP Sys > 160',time:'03:38',real:false},\n  ];\n  alarmData.forEach(({txt,time,real})=>{\n    const el = document.createElement('div');\n    el.className = 'icu-alarm' + (real?' firing':'');\n    el.innerHTML = `<span class=\"ia-dot\"><\u002Fspan><span class=\"ia-txt\">${txt}<\u002Fspan><span class=\"ia-time\">${time}<\u002Fspan>`;\n    container.appendChild(el);\n  });\n  \u002F\u002F Periodically fire a random false alarm at top\n  const falseTxts = ['HR > 100','Lead off \u00b7 motion','SpO\u2082 transient drop','NIBP retry','RR > 20'];\n  let idx=0;\n  setInterval(()=>{\n    const newEl = document.createElement('div');\n    newEl.className = 'icu-alarm';\n    const now = new Date(); const h=String(now.getHours()).padStart(2,'0'); const m=String(now.getMinutes()).padStart(2,'0');\n    newEl.innerHTML = `<span class=\"ia-dot\"><\u002Fspan><span class=\"ia-txt\">${falseTxts[idx%falseTxts.length]}<\u002Fspan><span class=\"ia-time\">${h}:${m}<\u002Fspan>`;\n    container.insertBefore(newEl, container.firstChild);\n    if(container.children.length>6) container.removeChild(container.lastChild);\n    idx++;\n  }, 2200);\n})();\n\n\u002F\u002F \u2500\u2500 CLOCKS \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nfunction runClock(id, startSecs) {\n  const el = document.getElementById(id);\n  if(!el) return;\n  let s = startSecs;\n  setInterval(()=>{\n    s++;\n    el.textContent = [Math.floor(s\u002F3600)%24, Math.floor((s%3600)\u002F60), s%60]\n      .map(n=>String(n).padStart(2,'0')).join(':');\n  }, 1000);\n}\nrunClock('dashClock', 3*3600+42*60+17);\nrunClock('icuClock',  3*3600+42*60+18);\n\n\u002F\u002F \u2500\u2500 CONTACT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\ndocument.getElementById('contactForm').addEventListener('submit',e=>{\n  e.preventDefault();\n  const f=e.currentTarget,st=document.getElementById('formStatus');\n  const ok=f.name.value.trim()&&f.email.value.trim()&&f.message.value.trim()&&\u002F^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$\u002F.test(f.email.value);\n  st.textContent=ok?\"Got it we'll be in touch shortly.\":'Please fill in all fields with a valid email.';\n  st.classList.add('show');\n  if(ok){f.reset();setTimeout(()=>st.classList.remove('show'),4000);}\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
